{% load widget_tweaks %}
<form hx-post="{{ form_action }}"
      hx-target="#inventory-tbody"
      hx-swap="innerHTML"
      hx-on::after-request="bootstrap.Offcanvas.getOrCreateInstance(document.getElementById('drawer')).hide()"
      x-data="{ articleType: 'ingredient' }">
  {% csrf_token %}
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label">Type</label>
      <div class="d-flex gap-3">
        <div class="form-check">
          <input class="form-check-input" type="radio" name="article_type"
                 value="ingredient" id="type_ing" checked x-model="articleType">
          <label class="form-check-label" for="type_ing">Ingrédient</label>
        </div>
        <div class="form-check">
          <input class="form-check-input" type="radio" name="article_type"
                 value="recipe" id="type_rec" x-model="articleType">
          <label class="form-check-label" for="type_rec">Recette</label>
        </div>
      </div>
    </div>
    <div class="col-12" x-show="articleType === 'ingredient'">
      <label class="form-label">Ingrédient</label>
      <select name="ingredient" class="form-select">
        <option value="">— Sélectionner —</option>
        {% for ing in ingredients %}
        <option value="{{ ing.pk }}">{{ ing.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12" x-show="articleType === 'recipe'">
      <label class="form-label">Recette</label>
      <select name="recipe" class="form-select">
        <option value="">— Sélectionner —</option>
        {% for r in recipes %}
        <option value="{{ r.pk }}">{{ r.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-8">
      <label class="form-label">Quantité comptée</label>
      <input type="number" name="counted_quantity" class="form-control"
             step="0.001" value="0" inputmode="decimal">
    </div>
    <div class="col-4">
      <label class="form-label">Unité *</label>
      <select name="unit" class="form-select">
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="litre">litre</option>
        <option value="cl">cl</option>
        <option value="ml">ml</option>
        <option value="pièce">pièce</option>
        <option value="paquet">paquet</option>
        <option value="colis">colis</option>
        <option value="portion">portion</option>
        <option value="m">mètre</option>
        <option value="cm">centimètre</option>
      </select>
    </div>
  </div>
  <hr class="divider mt-3">
  <button type="submit" class="btn btn-primary">
    <i class="fa-solid fa-plus"></i> Ajouter
  </button>
</form>
