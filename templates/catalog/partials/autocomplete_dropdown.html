{% if results %}
<div class="autocomplete-dropdown">
  {% for r in results %}
  <div class="autocomplete-item"
       data-id="{{ r.id }}"
       data-type="{{ r.type }}"
       data-label="{{ r.label }}"
       data-cost="{{ r.cost }}"
       data-unit="{{ r.unit }}"
       onclick="selectAutocompleteItem(this)">
    <div class="d-flex justify-content-between align-items-center">
      <span>
        <span class="badge {% if r.type == 'ingredient' %}badge-muted{% else %}badge-info{% endif %} me-2">
          {{ r.type_display }}
        </span>
        {{ r.label }}
      </span>
      <span class="text-muted" style="font-size:var(--font-size-xs)">
        {{ r.cost }} € / {{ r.unit }}
      </span>
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
