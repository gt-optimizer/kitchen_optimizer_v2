<div class="price-drawer-body">
  {% if saved %}
  <div class="alert alert-success mb-3">
    <i class="fa-solid fa-check"></i> Étape mise à jour.
  </div>
  {% endif %}

  <form hx-post="{% url 'catalog:recipe_step_edit' step.pk %}"
        hx-target="#recipe-step-drawer-content"
        hx-swap="innerHTML"
        enctype="multipart/form-data">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Titre *</label>
      {{ form.title }}
    </div>
    <div class="mb-3">
      <label class="form-label">Description</label>
      {{ form.description }}
    </div>
    <div class="row g-3 mb-3">
      <div class="col-6">
        <label class="form-label">Durée (min)</label>
        {{ form.duration_minutes }}
      </div>
      <div class="col-6">
        <label class="form-label">Température (°C)</label>
        {{ form.temperature_c }}
      </div>
    </div>
    {% if step.photo %}
    <div class="mb-2">
      <img src="{{ step.photo.url }}" alt="Photo étape"
           style="height:60px; border-radius:var(--radius-sm)">
    </div>
    {% endif %}
    <div class="mb-3">
      <label class="form-label">Photo</label>
      {{ form.photo }}
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="fa-solid fa-check"></i> Enregistrer
      </button>
      <button type="button" class="btn btn-ghost"
              onclick="document.getElementById('recipe-step-drawer').classList.remove('open')">
        Fermer
      </button>
    </div>
  </form>
</div>
